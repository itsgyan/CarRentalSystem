<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F1A24" />
      <stop offset="100%" stop-color="#0E0C12" />
    </linearGradient>
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D0BCFF" />
      <stop offset="100%" stop-color="#806BBA" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark outer background with premium smooth roundness -->
  <rect x="0" y="0" width="128" height="128" rx="36" fill="url(#bgGrad)" stroke="#381E72" stroke-width="3" />

  <!-- Outer glowing path/ring -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-dasharray="10, 8" opacity="0.65" />

  <!-- Inner GPS Location Shield / Pin -->
  <path d="M64,24 C45,24 38,41 38,58 C38,82 64,104 64,104 C64,104 90,82 90,58 C90,41 83,24 64,24 Z" 
        fill="url(#accentGrad)" 
        filter="url(#glow)" />

  <!-- Inner Dark Pin Core -->
  <circle cx="64" cy="56" r="22" fill="#141218" />

  <!-- Sleek Steering Wheel / Car Icon inside Pin Core -->
  <path d="M64,42 C56.27,42 50,48.27 50,56 C50,63.73 56.27,70 64,70 C71.73,70 78,63.73 78,56 C78,48.27 71.73,42 64,42 Z 
           M64,46 C67.45,46 70.47,47.8 72.24,50.5 L64,54 L55.76,50.5 C57.53,47.8 60.55,46 64,46 Z 
           M54,56 C54,54.85 54.21,53.75 54.58,52.73 L61.5,55.7 L61.5,65.66 C57.24,65.17 54,61.46 54,56 Z 
           M66.5,65.66 L66.5,55.7 L73.42,52.73 C73.79,53.75 74,54.85 74,56 C74,61.46 70.76,65.17 66.5,65.66 Z" 
        fill="#D0BCFF" />
</svg>